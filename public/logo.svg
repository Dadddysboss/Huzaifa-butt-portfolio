<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#41C0F2" />
      <stop offset="100%" stop-color="#006699" />
    </linearGradient>
    <linearGradient id="slateText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 0)">
    <circle cx="70" cy="100" r="45" fill="none" stroke="#e2e8f0" stroke-width="1" />
    <circle cx="70" cy="100" r="35" fill="none" stroke="#41C0F2" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.6" />
    
    <path d="M 50,75 L 50,125 M 50,100 L 90,100 M 90,75 L 90,125" 
          fill="none" 
          stroke="url(#cyberBlue)" 
          stroke-width="7" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          filter="url(#glow)" />
          
    <circle cx="50" cy="75" r="3.5" fill="#0F172A" />
    <circle cx="90" cy="125" r="3.5" fill="#0F172A" />
    <circle cx="70" cy="100" r="3" fill="#41C0F2" />
  </g>

  <text x="145" y="102" 
        font-family="'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" 
        font-size="36" 
        font-weight="900" 
        fill="url(#slateText)" 
        letter-spacing="1.5">
    M. HUZAIFA BUTT
  </text>

  <text x="147" y="132" 
        font-family="monospace" 
        font-size="12" 
        font-weight="800" 
        fill="#41C0F2" 
        letter-spacing="4"
        filter="url(#glow)">
    // ENTERPRISE SYSTEMS ARCHITECT
  </text>

  <line x1="147" y1="145" x2="490" y2="145" stroke="#41C0F2" stroke-width="2" opacity="0.8" />
  <circle cx="490" cy="145" r="2" fill="#0F172A" />
</svg>
